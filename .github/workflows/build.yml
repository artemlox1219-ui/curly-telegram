name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev libssl-dev autoconf automake libtool pkg-config zlib1g-dev ccache cmake clang openjdk-17-jdk unzip zip
        pip install --upgrade pip
        pip install buildozer cython

    - name: Build with Buildozer
      run: |
        buildozer init
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy/' buildozer.spec
        sed -i 's/#android.api = 33/android.api = 33/' buildozer.spec
        yes | buildozer -v android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: bin/*.apk
        
